name: Build
on:
  pull_request:
    branches: [ master ]
jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v3
      - name: Rust Setup
        uses: actions/setup-rust@v1
        with:
          rust-version: stable
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test --all-features
      - name: Format
        run: cargo fmt -- --check
