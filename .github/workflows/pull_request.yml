on: [ pull_request ]
name: Pull Request
jobs:
  format:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Format
        run: |
          cargo fmt --all -- --check
      - name: Build
        run: |
          cargo check
      - name: Test
        run: |
          cargo test
